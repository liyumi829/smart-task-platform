# 项目中的使用的配置

# MySQL 配置
mysql:
  # MySQL 主机
  host: 127.0.0.1
  # MySQL 端口
  port: 3306
  # MySQL 用户名
  user: root
  # MySQL 密码
  password: "your_password_here"
  # 数据库名称
  database: smart_task_platform
  # 字符集
  charset: utf8mb4
  # 是否解析时间
  parse_time: true
  # 时区
  loc: Local
  # 最大连接数
  max_open_conns: 100
  # 最大空闲连接数
  max_idle_conns: 20
  # 连接最大生命周期(单位: s)
  conn_max_lifetime: 30
  # 连接最大空闲时间(单位: s)
  conn_max_idle_time: 10


# Redis 配置
redis:
  # Redis 地址，集群写多个
  addrs:
    - 127.0.0.1:6379  
  # 密码，没有就空
  password: ""        
  # 数据库，集群只能用0
  db: 0               
  # 最大连接数
  pool_size: 100       
  # 最小空闲连接
  min_idle_conns: 10    


# Log 日志配置
log:
  # 运行模式 debug/prod
  mode: "debug"
  # 日志存储路径
  log_path: "./logs"
  # 日志存储文件名称
  log_name: "log"
  # 日志文件的最大存储大小
  max_size: 128
  # 最多保存的日志文件个数
  max_backups: 30
  # 最多保存的天数
  max_age: 7

# JWT 配置
jwt:
  # JWT 密钥
  secret_key: "your_secret_key"
  # JWT 签发者
  issuer: "smart_task_platform"
  # JWT 过期时间，单位: s
  access_token_ttl: 3600
  # JWT 刷新过期时间，单位: s
  refresh_token_ttl: 604800

# RabbitMQ 配置
rabbitmq:
  # host
  host: "localhost"
  # user
  user: "root"
  # password
  password: "967096489"
  # 业务队列名称
  queue_name: "smart-task-platform.notification.queue"
  # 每次拉取的条数
  prefetch_count: 10

# Outbox Worker 管理器配置
outbox_worker_manager:
  # 是否禁用
  disabled: false
  # 并发工作协程数
  worker_count: 1
  # 工作协程 ID 前缀
  worker_id_prefix: "outbox-worker"
  # 优雅关闭超时时间
  stop_timeout: "10s"
  # worker 配置
  outbox_worker:
    # 轮询数据库间隔
    poll_interval: "3s"
    # 每批拉取消息数量
    batch_size: 100
    # 单批处理超时时间
    processing_timeout: "10m"
    # 处理失败重试退避时间
    retry_backoff: "30s"
    # 启动时是否重置超时任务
    reset_timeout_on_startup: true

# Handle Worker 管理器配置
handle_worker_manager:
  # 是否禁用
  disabled: false
  # 并发工作协程数
  worker_count: 1
  # 工作协程 ID 前缀
  worker_id_prefix: "forwarding-worker"
  # 优雅关闭超时时间
  stop_timeout: "10s"
  # worker 配置
  handle_worker:
    # 最大重试次数
    max_retries: 3
